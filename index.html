<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#f97316">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <title>BashaDrive Pro</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,700,0,0" rel="stylesheet" />

    <style>
        [x-cloak] { display: none !important; }
        body { 
            background-color: #000000; 
            color: #ffffff; 
            font-family: system-ui, -apple-system, sans-serif;
            padding-top: env(safe-area-inset-top);
        }

        .bloque-trabajo {
            background: #111827;
            border-radius: 1.5rem;
            border-left: 12px solid;
            padding: 1.25rem;
            margin-bottom: 1rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .border-expres { border-left-color: #0ea5e9; } 
        .border-escolar { border-left-color: #10b981; } 
        .border-tarde { border-left-color: #f59e0b; }   
        .border-libre { border-left-color: #475569; opacity: 0.6; }

        .bus-tag {
            background: #f97316;
            color: #000000;
            padding: 4px 12px;
            border-radius: 0.75rem;
            font-weight: 900;
            font-size: 1.4rem;
            line-height: 1;
        }

        .servicio-item {
            border-bottom: 1px solid rgba(255,255,255,0.05);
            padding: 8px 0;
        }
        .servicio-item:last-child { border-bottom: none; }

        .texto-servicio { font-size: 1.2rem; font-weight: 700; color: #f8fafc; }
        .info-dia { font-size: 1rem; font-weight: 800; color: #94a3b8; text-transform: uppercase; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body x-data="bashaApp()" x-init="init()">

    <header class="p-4 sticky top-0 bg-black/90 backdrop-blur-md z-50 flex justify-between items-center border-b border-white/10">
        <div>
            <h1 class="text-xl font-black text-orange-500 italic">BASHADRIVE <span class="text-white">PRO</span></h1>
            <p class="text-[9px] font-bold text-sky-400 tracking-widest uppercase">Cód. 86 • Menorca</p>
        </div>
        <button @click="ui.showImport = true" class="bg-orange-600 w-12 h-12 rounded-full flex items-center justify-center shadow-lg active:scale-90 transition">
            <span class="material-symbols-outlined text-3xl text-white">edit_note</span>
        </button>
    </header>

    <main class="p-3 pb-32 overflow-y-auto hide-scrollbar">
        <template x-for="(dia, index) in planning" :key="index">
            <div class="bloque-trabajo" :class="getEstilo(dia.servicios)">
                <div class="flex justify-between items-center mb-2 border-b border-white/5 pb-2">
                    <p class="info-dia" x-text="dia.diaSemana + ' ' + dia.fecha"></p>
                    <div class="flex gap-2">
                        <template x-for="bus in dia.buses">
                            <span class="bus-tag" x-text="bus"></span>
                        </template>
                    </div>
                </div>
                
                <div class="flex flex-col">
                    <template x-for="serv in dia.servicios">
                        <div class="servicio-item">
                            <p class="texto-servicio" x-text="serv"></p>
                        </div>
                    </template>
                </div>
                
                <div class="mt-3 flex items-center gap-2 text-emerald-400" x-show="dia.dieta">
                    <span class="material-symbols-outlined text-xl">restaurant</span>
                    <span class="text-[10px] font-black uppercase">Dieta de Cena Confirmada</span>
                </div>
            </div>
        </template>
    </main>

    <div x-show="ui.showImport" x-cloak class="fixed inset-0 bg-black/98 z-[100] p-6 flex flex-col">
        <div class="flex justify-between items-center mb-6 pt-4">
            <h2 class="text-xl font-black text-orange-500 uppercase">Pegar Cuadrante</h2>
            <button @click="ui.showImport = false" class="text-white"><span class="material-symbols-outlined text-4xl">close</span></button>
        </div>
        <textarea x-model="inputRaw" class="flex-grow bg-white/5 border border-white/20 rounded-3xl p-5 outline-none text-sky-400" placeholder="Pega el texto aquí..."></textarea>
        <button @click="procesarCuadrante()" class="mt-6 bg-orange-600 text-white py-6 rounded-3xl font-black text-lg uppercase shadow-2xl active:scale-95 transition-all">
            ACTUALIZAR CUADRANTE
        </button>
    </div>

    <script>
        function bashaApp() {
            return {
                ui: { showImport: false },
                inputRaw: '',
                planning: [],

                init() {
                    const saved = localStorage.getItem('basha_plan_v3');
                    if (saved) this.planning = JSON.parse(saved);
                },

                getEstilo(servicios) {
                    const s = servicios.join(' ').toUpperCase();
                    if (s.includes('EXPRES')) return 'border-expres';
                    if (s.includes('ESC.') || s.includes('GALDANA')) return 'border-escolar';
                    if (s.includes('REFU') || s.includes('TARDE')) return 'border-tarde';
                    if (s.includes('LIBRE')) return 'border-libre';
                    return '';
                },

                procesarCuadrante() {
                    // Datos ajustados para los 4 servicios del viernes y la semana 19
                    const data = [
                        { fecha: "04-05", diaSemana: "Lunes", servicios: ["Bus Expres Ciu Mañanas"], buses: ["67"], dieta: false },
                        { fecha: "05-05", diaSemana: "Martes", servicios: ["Bus Expresito II Ciutadella", "Escolar Ferreries (V231)"], buses: ["70", "46"], dieta: false },
                        { fecha: "06-05", diaSemana: "Miércoles", servicios: ["Ciu-Mao 2º Mañanas"], buses: ["64"], dieta: false },
                        { fecha: "07-05", diaSemana: "Jueves", servicios: ["Ciu-C.Tomas mañanas", "Fer-Galdana"], buses: ["65", "60"], dieta: false },
                        { fecha: "08-05", diaSemana: "Viernes", servicios: ["Fer-Mig 15:00", "Escolar Ferreries (V235)", "Bus Exprés", "Servicio Extra"], buses: ["71", "48"], dieta: false },
                        { fecha: "09-05", diaSemana: "Sábado", servicios: ["Día LIBRE"], buses: [], dieta: false },
                        { fecha: "10-05", diaSemana: "Domingo", servicios: ["Ciu-Mao Refu Saba y Dom Tarde"], buses: ["67", "48"], dieta: true }
                    ];

                    this.planning = data;
                    localStorage.setItem('basha_plan_v3', JSON.stringify(this.planning));
                    this.ui.showImport = false;
                }
            }
        }

        // REGISTRO DEL SERVICE WORKER PARA INSTALACIÓN
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
                .then(() => console.log("BashaDrive: Sistema de instalación activo"))
                .catch((err) => console.log("Error al activar PWA", err));
        }
    </script>
</body>
</html>
